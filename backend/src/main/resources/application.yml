server:
  port: 8080

spring:
  application:
    name: hr-interview-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hr_interview}
    username: ${SPRING_DATASOURCE_USERNAME:hr}
    password: ${SPRING_DATASOURCE_PASSWORD:hr_secret}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 32MB

temporal:
  target: ${TEMPORAL_TARGET:localhost:7233}
  namespace: ${TEMPORAL_NAMESPACE:default}
  task-queue: ${TEMPORAL_TASK_QUEUE:hr-interview}

app:
  rag-upload-dir: ${RAG_UPLOAD_DIR:./data/uploads}
