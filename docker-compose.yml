services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hr
      POSTGRES_PASSWORD: hr_secret
      POSTGRES_DB: hr_interview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      - postgres
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: hr
      POSTGRES_PWD: hr_secret
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8088:8080"

volumes:
  pgdata:
