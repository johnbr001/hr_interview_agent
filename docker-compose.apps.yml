# Full stack on top of docker-compose.yml (postgres + temporal)
services:
  ai-agent:
    build: ./ai-agent
    env_file: .env
    depends_on:
      - temporal
    volumes:
      - chroma:/app/data/chroma
      - uploads:/app/data/uploads

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://hr:hr_secret@postgres:5432/hr_interview
      TEMPORAL_HOST: temporal:7233
      RAG_UPLOAD_DIR: /data/uploads
    depends_on:
      - postgres
      - temporal
    volumes:
      - uploads:/data/uploads

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  chroma:
  uploads:
